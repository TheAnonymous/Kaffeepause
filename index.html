<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#17131e" />
    <meta name="description" content="Kaffeepause – ein autonomes Pixel-Art-Café am Regentag" />
    <title>Kaffeepause</title>
  </head>
  <body>
    <main id="app">
      <canvas id="cafe" width="384" height="216" role="img" aria-label="Ein gemütliches, belebtes Pixel-Art-Café an einem Regentag"></canvas>
      <div class="vignette" aria-hidden="true"></div>
      <section class="welcome" data-testid="welcome" aria-labelledby="title">
        <div class="welcome__card">
          <span class="welcome__eyebrow">Ein kleiner Regentag</span>
          <h1 id="title">Kaffeepause</h1>
          <p>Mach es dir bequem. Draußen darf es eine Weile regnen.</p>
          <button id="enter" type="button" data-testid="enter">Café betreten</button>
        </div>
      </section>
      <button id="sound" class="sound" type="button" data-testid="sound" aria-label="Ton ausschalten" aria-pressed="false" hidden>
        <span aria-hidden="true">♪</span>
      </button>
      <div id="status" class="sr-only" role="status" aria-live="polite">Das Café wartet.</div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
